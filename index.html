<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#071320">
<meta name="description" content="Lodní navigace a přehled pro plavební oblast Slapy — mapa, GPS, říční kilometráž, přístaviště, pravidla plavby, počasí.">
<title>Slapy Navigátor — lodní mapa a navigace</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="vendor/leaflet/leaflet.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- ===================== STAVOVÝ PRUH (GPS) ===================== -->
<header id="statusbar" aria-label="Stav plavby">
  <div class="stat" id="stat-speed" title="Rychlost">
    <span class="stat-value" id="speed-val">—</span>
    <span class="stat-unit" id="speed-unit">km/h</span>
  </div>
  <div class="stat" id="stat-course" title="Kurz">
    <span class="stat-value" id="course-val">—</span>
    <span class="stat-unit">kurz</span>
  </div>
  <div class="stat" id="stat-km" title="Říční kilometr">
    <span class="stat-value" id="km-val">—</span>
    <span class="stat-unit">ř. km</span>
  </div>
  <div class="stat" id="stat-depth" title="Hladina">
    <span class="stat-value" id="level-val">—</span>
    <span class="stat-unit">hladina</span>
  </div>
  <button id="gps-btn" class="gps-off" aria-label="Zapnout GPS">GPS</button>
</header>

<!-- ===================== VAROVÁNÍ ===================== -->
<div id="alertbar" hidden></div>

<!-- ===================== MAPA ===================== -->
<main id="map" role="application" aria-label="Plavební mapa Slapy"></main>
<div id="map3d" aria-label="3D pohled na nádrž" style="display:none"></div>

<!-- plovoucí tlačítka na mapě -->
<div id="map-fabs">
  <button id="fab-3d" title="3D pohled" aria-label="Přepnout 3D pohled na terén">3D</button>
  <button id="fab-locate" title="Moje poloha" aria-label="Vycentrovat na moji polohu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
  </button>
  <button id="fab-layers" title="Mapové podklady" aria-label="Přepnout mapový podklad">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="m3 13 9 5 9-5"/></svg>
  </button>
  <button id="fab-north" title="Sever nahoře / po kurzu" aria-label="Orientace mapy">N↑</button>
  <button id="fab-mob" title="Muž přes palubu" aria-label="Muž přes palubu — označit polohu">MOB</button>
</div>

<!-- měření vzdálenosti / cíl -->
<div id="target-info" hidden>
  <div id="target-text"></div>
  <button id="target-clear" aria-label="Zrušit cíl">✕</button>
</div>

<!-- ===================== PANELY ===================== -->
<div id="scrim" hidden></div>
<section id="panel" hidden>
  <div id="panel-handle"><span></span></div>
  <div id="panel-content"></div>
</section>

<!-- ===================== SPODNÍ NAVIGACE ===================== -->
<nav id="tabbar" aria-label="Hlavní navigace">
  <button data-tab="map" class="active" aria-label="Mapa"><span class="ico">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m15.5 8.5-2 5-5 2 2-5 5-2Z" fill="currentColor" stroke="none"/></svg>
  </span>Mapa</button>
  <button data-tab="places" aria-label="Místa"><span class="ico">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="2.4"/><path d="M12 7.4V21M5 13a7 7 0 0 0 14 0M5 13H3m16 0h2"/></svg>
  </span>Místa</button>
  <button data-tab="trip" aria-label="Plavba"><span class="ico">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="18.5" r="2.3"/><circle cx="18" cy="5.5" r="2.3"/><path d="M8 18.5h6a3.5 3.5 0 0 0 0-7h-4a3.5 3.5 0 0 1 0-7h6"/></svg>
  </span>Plavba</button>
  <button data-tab="rules" aria-label="Pravidla"><span class="ico">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M4 7h16M7 7l-3 6a3 3 0 0 0 6 0L7 7Zm10 0-3 6a3 3 0 0 0 6 0l-3-6Z"/></svg>
  </span>Pravidla</button>
  <button data-tab="info" aria-label="Informace"><span class="ico">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5"/><circle cx="12" cy="7.8" r="0.6" fill="currentColor"/></svg>
  </span>Info</button>
</nav>

<script src="vendor/leaflet/leaflet.js"></script>
<script src="js/data/river.js"></script>
<script src="js/data/zones.js"></script>
<script src="js/data/pois.js"></script>
<script src="js/data/rules.js"></script>
<script src="js/data/isobaths.js"></script>
<script src="js/riverkm.js"></script>
<script src="js/depth.js"></script>
<script src="js/map3d.js"></script>
<script src="js/gps.js"></script>
<script src="js/weather.js"></script>
<script src="js/panels.js"></script>
<script src="js/app.js"></script>
</body>
</html>
