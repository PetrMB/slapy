name: Bake terrain + isobaths (DMR 5G)

on:
  workflow_dispatch:
    inputs:
      what:
        description: "Co generovat (all / tiles / depth)"
        default: "all"
        required: false

permissions:
  contents: write

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install numpy scipy pillow requests tifffile imagecodecs scikit-image
      - name: Bake
        run: python tools/bake_terrain.py "${{ github.event.inputs.what || 'all' }}"
      - name: Commit results
        run: |
          git config user.name "slapy-bake-bot"
          git config user.email "actions@github.com"
          git add terrain js/data/isobaths.js data/depth.png
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "Bake DMR 5G terrain tiles + estimated isobaths [skip ci]"
          git push
